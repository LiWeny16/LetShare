<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

  <title>LetShare | Cross-platform File & Text Sharing</title>


  <meta name="msvalidate.01" content="411D1135BD0F14F46E1AE89FE6D56B0B" />
  <meta name="description" content="Share files, clipboard content, and text across devices quickly without registration.">
  <meta name="keywords" content="file sharing, clipboard sharing, text sharing, cross-platform transfer, instant sharing, no registration">
  <meta name="author" content="Let's Share Now Team">
  <meta name="robots" content="index, follow">
  <link rel="icon" type="image/svg+xml" href="/icons/favicon_io/favicon-32x32.png" />
  <meta name="theme-color" content="#ffffff" />

  <!-- 加载骨架屏（内联 CSS, 零额外请求） -->
  <style>
    #app-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      font-family: system-ui, -apple-system, sans-serif;
      background: #f7f8fa;
      position: fixed;
      inset: 0;
      z-index: 9999;
      transition: opacity 0.3s ease;
      padding: 24px;
      box-sizing: border-box;
    }
    #app-loading.hide {
      display: none;
      pointer-events: none;
    }
    .loading-card {
      width: min(320px, 100%);
      min-height: 292px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 28px;
      border-radius: 16px;
      background: #ffffff;
      box-shadow: 0 8px 28px rgba(15, 23, 42, 0.10);
      box-sizing: border-box;
      text-align: center;
    }
    .loading-card img {
      width: 96px;
      height: 96px;
      display: block;
      object-fit: contain;
      margin-bottom: 18px;
    }
    .loading-card .brand {
      color: #1f2937;
      font-size: 24px;
      font-weight: 500;
      line-height: 1.25;
      margin-bottom: 8px;
    }
    .loading-card .text {
      color: #6b7280;
      font-size: 14px;
      line-height: 1.5;
      min-height: 21px;
    }
    #app-loading .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #e0e0e0;
      border-top-color: #1976d2;
      border-radius: 50%;
      animation: lds-spin 0.8s linear infinite;
      margin-top: 22px;
    }
    @keyframes lds-spin {
      to { transform: rotate(360deg); }
    }

    /* 加载失败后的重试界面 */
    #app-error {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      font-family: system-ui, -apple-system, sans-serif;
      background: #f7f8fa;
      position: fixed;
      inset: 0;
      z-index: 10000;
      padding: 24px;
      box-sizing: border-box;
    }
    #app-error.show {
      display: flex;
    }
    #app-error .icon {
      font-size: 48px;
      margin-bottom: 16px;
    }
    #app-error .msg {
      color: #666;
      font-size: 14px;
      margin-bottom: 20px;
      text-align: center;
      padding: 0 24px;
      line-height: 1.6;
    }
    #app-error button {
      padding: 10px 24px;
      background: #1976d2;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      box-shadow: 0 2px 8px rgba(25, 118, 210, 0.28);
    }
    #app-error button:active {
      background: #1565c0;
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <!-- 加载骨架屏 -->
  <div id="app-loading">
    <div class="loading-card">
      <img src="/icons/startup-logo-192.png" alt="LetShare" width="96" height="96" decoding="async">
      <div class="brand">LetShare</div>
      <div class="text">Preparing your sharing room</div>
      <div class="spinner" aria-hidden="true"></div>
    </div>
  </div>

  <!-- 加载失败兜底 -->
  <div id="app-error">
    <div class="loading-card">
      <div class="icon">!</div>
      <div class="brand">LetShare</div>
      <div class="msg">Loading failed. Check your network connection and try again.</div>
      <button onclick="location.reload()">Reload</button>
    </div>
  </div>

  <script type="module" src="/src/main.tsx"></script>

  <!-- 兜底机制：监听 React 挂载 / 超时降级 -->
  <script>
    (function() {
      var LOADING = document.getElementById('app-loading');
      var ERROR = document.getElementById('app-error');
      var ROOT = document.getElementById('root');

      // 超时检测：8 秒后仍未挂载 → 显示错误
      var timeout = setTimeout(function() {
        if (ROOT && ROOT.children.length === 0) {
          LOADING.classList.add('hide');
          ERROR.classList.add('show');
        }
      }, 8000);

      // 监听 React 挂载成功 → 隐藏骨架屏
      var observer = new MutationObserver(function() {
        if (ROOT.children.length > 0) {
          clearTimeout(timeout);
          LOADING.classList.add('hide');
          ERROR.classList.remove('show');
          observer.disconnect();
        }
      });
      observer.observe(ROOT, { childList: true });
    })();
  </script>
</body>

</html>
