  <!-- 加载骨架屏（内联 CSS, 零额外请求） -->
  <style>
    #app-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f5f5;
      position: fixed;
      inset: 0;
      z-index: 9999;
      transition: opacity 0.3s ease;
    }
    #app-loading.hide {
      opacity: 0;
      pointer-events: none;
    }
    #app-loading .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #e0e0e0;
      border-top-color: #1976d2;
      border-radius: 50%;
      animation: lds-spin 0.8s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes lds-spin {
      to { transform: rotate(360deg); }
    }
    #app-loading .text {
      color: #999;
      font-size: 14px;
    }

    /* 加载失败后的重试界面 */
    #app-error {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f5f5;
      position: fixed;
      inset: 0;
      z-index: 10000;
    }
    #app-error.show {
      display: flex;
    }
    #app-error .icon {
      font-size: 48px;
      margin-bottom: 16px;
    }
    #app-error .msg {
      color: #666;
      font-size: 14px;
      margin-bottom: 20px;
      text-align: center;
      padding: 0 24px;
      line-height: 1.6;
    }
    #app-error button {
      padding: 10px 24px;
      background: #1976d2;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    #app-error button:active {
      background: #1565c0;
    }
  </style>

<body>
  <div id="root"></div>

  <!-- 加载骨架屏 -->
  <div id="app-loading">
    <div class="spinner"></div>
    <div class="text">正在加载…</div>
  </div>

  <!-- 加载失败兜底 -->
  <div id="app-error">
    <div class="icon">😵</div>
    <div class="msg">加载失败，请检查网络连接后重试</div>
    <button onclick="location.reload()">重新加载</button>
  </div>


  <!-- 兜底机制：监听 React 挂载 / 超时降级 -->
  <script>
    (function() {
      var LOADING = document.getElementById('app-loading');
      var ERROR = document.getElementById('app-error');
      var ROOT = document.getElementById('root');

      // 超时检测：8 秒后仍未挂载 → 显示错误
      var timeout = setTimeout(function() {
        if (ROOT && ROOT.children.length === 0) {
          LOADING.classList.add('hide');
          ERROR.classList.add('show');
        }
      }, 8000);

      // 监听 React 挂载成功 → 隐藏骨架屏
      var observer = new MutationObserver(function() {
        if (ROOT.children.length > 0) {
          clearTimeout(timeout);
          LOADING.classList.add('hide');
          ERROR.classList.remove('show');
          observer.disconnect();
        }
      });
      observer.observe(ROOT, { childList: true });
    })();
  </script>
