    .loading-card img {

    .loading-card .brand {

    #app-loading .spinner {

    #app-error .icon {

    }
    #app-error .msg {

    #app-error button {

      color: #fff;

      -webkit-tap-highlight-color: transparent;
      box-shadow: 0 2px 8px rgba(25, 118, 210, 0.28);

<body>
  <div id="root"></div>

  <!-- 加载骨架屏 -->
  <div id="app-loading">
    <div class="loading-card">
      <img src="./icons/startup-logo-192.png" alt="LetShare" width="96" height="96" decoding="async">
      <div class="brand">LetShare</div>
      <div class="text">Preparing your sharing room</div>
      <div class="spinner" aria-hidden="true"></div>
    </div>
  </div>

  <!-- 加载失败兜底 -->
  <div id="app-error">
    <div class="loading-card">
      <div class="icon">!</div>
      <div class="brand">LetShare</div>
      <div class="msg">Loading failed. Check your network connection and try again.</div>
      <button onclick="location.reload()">Reload</button>
    </div>
  </div>


  <!-- 兜底机制：监听 React 挂载 / 超时降级 -->
  <script>
    (function() {
      var LOADING = document.getElementById('app-loading');
      var ERROR = document.getElementById('app-error');
      var ROOT = document.getElementById('root');

      // 超时检测：8 秒后仍未挂载 → 显示错误
      var timeout = setTimeout(function() {
        if (ROOT && ROOT.children.length === 0) {
          LOADING.classList.add('hide');
          ERROR.classList.add('show');
        }
      }, 8000);

      // 监听 React 挂载成功 → 隐藏骨架屏
      var observer = new MutationObserver(function() {
        if (ROOT.children.length > 0) {
          clearTimeout(timeout);
          LOADING.classList.add('hide');
          ERROR.classList.remove('show');
          observer.disconnect();
        }
      });
      observer.observe(ROOT, { childList: true });
    })();
  </script>
